version: '3.8'

services:
  boutique-app:
    build: .
    container_name: boutique-app
    ports:
      - "8081:8080"
    depends_on:
      - mysql-db
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/boutique_db?createDatabaseIfNotExist=true
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD} # This will be read from the .env file
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update

  mysql-db:
    image: mysql:8.0
    container_name: mysql-db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD} # This will be read from the .env file
      - MYSQL_DATABASE=boutique_db
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
