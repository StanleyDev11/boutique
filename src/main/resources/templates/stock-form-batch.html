<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mouvement de Stock par Lot</title>
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <link rel="icon" type="image/x-icon" th:href="@{${boutiqueLogo}}">
    <link rel="stylesheet" href="/vendor/tailwind/tailwind.css">
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css">
    <script defer src="/vendor/alpinejs/cdn.min.js"></script>
    <script src="/vendor/sweetalert2/sweetalert2.all.min.js"></script>
    <style>
        [x-cloak] { display: none !important; }
        .quantity-input::-webkit-outer-spin-button,
        .quantity-input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .quantity-input { -moz-appearance: textfield; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">

<div th:replace="~{fragments/tailwind-header :: tailwind-header(pageTitle='Mouvement de Stock par Lot')}"></div>

<div class="w-full px-4 sm:px-6 lg:px-8 py-8"
     th:attr="data-produits=${produitsJson}"
     x-data="batchStockForm()"
     x-init="init($el.dataset.produits)">

    <form @submit.prevent="submitForm($el)" method="post" action="/stock/save-batch" class="space-y-8">
        
        <!-- Header Info -->
        <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-200/80">
            <h2 class="text-2xl font-bold mb-6 flex items-center"><i class="fas fa-file-invoice mr-4 text-indigo-500"></i>Informations Générales</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                <div>
                    <label for="numeroFacture" class="block text-sm font-medium text-gray-700 mb-2">Numéro de Facture</label>
                    <input type="text" name="numeroFacture" x-model="numeroFacture" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="ex: FAC-2023-001">
                </div>
                <div>
                    <label for="nomFournisseur" class="block text-sm font-medium text-gray-700 mb-2">Nom du Fournisseur</label>
                    <input type="text" name="nomFournisseur" x-model="nomFournisseur" class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="ex: Fournisseur Principal">
                </div>
                <div>
                    <label for="typeMouvement" class="block text-sm font-medium text-gray-700 mb-2">Type de Mouvement *</label>
                    <select name="typeMouvement" x-model="typeMouvement" required class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                        <option value="">-- Sélectionner --</option>
                        <option th:each="type : ${typesMouvement}" th:value="${type}" th:text="${type.libelle}"></option>
                    </select>
                </div>
            </div>
            <div class="mt-6">
                <label for="description" class="block text-sm font-medium text-gray-700 mb-2">Description (Optionnel)</label>
                <textarea name="description" rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500" placeholder="Raison du mouvement, référence, etc."></textarea>
            </div>
        </div>

        <!-- Product Lines -->
        <div class="bg-white p-8 rounded-xl shadow-lg border border-gray-200/80">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold flex items-center"><i class="fas fa-boxes mr-4 text-indigo-500"></i>Produits</h2>
                <button type="button" @click="addMovementLine" class="px-6 py-2 bg-indigo-600 text-white font-semibold rounded-lg hover:bg-indigo-700 transition shadow-md"><i class="fas fa-plus mr-2"></i>Ajouter un produit</button>
            </div>

            <div id="movement-lines-container" class="space-y-4">
                <template x-for="(line, index) in movementLines" :key="index">
                    <div class="product-line flex flex-col sm:flex-row sm:items-center gap-4 p-4 bg-gray-50 rounded-lg border">
                        <!-- Searchable Dropdown -->
                        <div class="flex-grow" x-data="{ open: false }" @click.away="open = false">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Produit *</label>
                            <div class="relative">
                                <input type="text"
                                       @click="open = true"
                                       x-model="line.search"
                                       placeholder="Rechercher un produit..."
                                       class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 bg-white">
                                <!-- Hidden input for the actual product ID -->
                                <input type="hidden" :name="'mouvements[' + index + '].produitId'" x-model="line.produitId" required>

                                <div x-show="open" x-cloak
                                     class="absolute z-10 w-full bg-white border border-gray-200 rounded-lg mt-1 max-h-60 overflow-y-auto shadow-lg">
                                    <template x-for="product in filteredProducts(line.search)" :key="product.id">
                                        <div @click="line.produitId = product.id; line.search = product.name; open = false;"
                                             class="p-3 cursor-pointer hover:bg-indigo-50">
                                            <p class="font-semibold" x-text="product.name"></p>
                                            <p class="text-sm text-gray-500">Stock: <span x-text="product.stock"></span></p>
                                        </div>
                                    </template>
                                    <div x-show="filteredProducts(line.search).length === 0" class="p-3 text-center text-gray-500">
                                        Aucun produit trouvé.
                                    </div>
                                </div>
                            </div>
                        </div>
                        <div class="w-full sm:w-48">
                            <label class="block text-sm font-medium text-gray-700 mb-1">Quantité *</label>
                            <input type="number" :name="'mouvements[' + index + '].quantite'" x-model.number="line.quantite" required min="0.01" step="0.01" placeholder="0.00" class="quantity-input w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-transparent mb-1">Action</label>
                            <button type="button" @click="removeMovementLine(index)" class="px-4 py-2.5 bg-red-500 text-white rounded-lg hover:bg-red-600 transition"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </div>
                </template>
            </div>
            <div x-show="movementLines.length === 0" x-cloak class="text-center py-12 border-2 border-dashed rounded-lg mt-6">
                <i class="fas fa-box-open text-4xl text-gray-300 mb-4"></i>
                <p class="text-gray-500">Veuillez ajouter au moins un produit pour le mouvement.</p>
            </div>
        </div>

        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <div class="flex flex-col sm:flex-row sm:justify-end gap-3">
            <a th:href="@{/produits}" class="w-full sm:w-auto text-center px-8 py-3 border border-gray-300 font-medium text-gray-700 rounded-lg hover:bg-gray-100 shadow-sm transition">Annuler</a>
            <button type="submit" :disabled="movementLines.length === 0" class="w-full sm:w-auto px-8 py-3 bg-indigo-600 text-white font-medium rounded-lg hover:bg-indigo-700 shadow-lg disabled:bg-gray-400 disabled:cursor-not-allowed">Enregistrer les Mouvements</button>
        </div>
    </form>
</div>
<script th:inline="javascript">
    const Toast = Swal.mixin({ toast: true, position: 'top-end', showConfirmButton: false, timer: 3500, timerProgressBar: true });

    function batchStockForm() {
        return {
            products: [],
            numeroFacture: '',
            nomFournisseur: '',
            typeMouvement: 'ENTREE',
            movementLines: [],

            init(produitsJson) {
                this.products = JSON.parse(produitsJson);
            },

            filteredProducts(search) {
                if (!search) {
                    return this.products;
                }
                return this.products.filter(p =>
                    p.name.toLowerCase().includes(search.toLowerCase())
                );
            },

            addMovementLine() {
                this.movementLines.push({ produitId: '', quantite: 1, search: '' });
            },

            removeMovementLine(index) {
                this.movementLines.splice(index, 1);
            },
            
            async submitForm(form) {
                if (this.movementLines.length === 0) {
                    Toast.fire({ icon: 'warning', title: 'Veuillez ajouter au moins un produit.' });
                    return;
                }

                // Simple validation
                for (const line of this.movementLines) {
                    if (!line.produitId || !line.quantite || line.quantite <= 0) {
                        Toast.fire({ icon: 'error', title: 'Données invalides', text: 'Veuillez vérifier que chaque ligne a un produit et une quantité valide.' });
                        return;
                    }
                }
                
                const formData = new FormData(form);
                const csrfToken = document.querySelector('meta[name="_csrf"]').getAttribute('content');
                const csrfHeader = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');

                Swal.fire({
                    title: 'Veuillez patienter...',
                    text: 'Enregistrement des mouvements en cours.',
                    allowOutsideClick: false,
                    didOpen: () => {
                        Swal.showLoading();
                    }
                });

                try {
                    const response = await fetch(form.action, {
                        method: 'POST',
                        headers: { [csrfHeader]: csrfToken },
                        body: formData
                    });

                    const result = await response.json();

                    if (response.ok && result.success) {
                        Swal.fire({
                            icon: 'success',
                            title: 'Succès!',
                            text: result.message,
                        }).then(() => {
                           if(result.redirectUrl) {
                               window.location.href = result.redirectUrl;
                           } else {
                               window.location.href = '/produits';
                           }
                        });
                    } else {
                        throw new Error(result.message || 'Une erreur est survenue.');
                    }
                } catch (error) {
                    Swal.fire({
                        icon: 'error',
                        title: 'Erreur!',
                        text: error.message,
                    });
                }
            }
        };
    }
</script>
</body>
</html>
