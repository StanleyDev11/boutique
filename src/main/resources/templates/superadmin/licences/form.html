<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Assigner/Modifier une Licence</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">

<div th:replace="~{fragments/tailwind-header :: tailwind-header(pageTitle='Gérer les Licences')}"></div>

<div class="container mx-auto px-4 py-12">
    <h1 class="text-4xl font-bold text-gray-800 mb-8" th:text="${licence.id == null} ? 'Assigner une nouvelle Licence' : 'Modifier la Licence'">Assigner une Licence</h1>

    <div class="bg-white rounded-lg shadow-lg p-8">
        <form th:object="${licence}" th:action="${licence.id == null} ? @{/superadmin/licences/save} : @{/superadmin/licences/update/{id}(id=${licence.id})}" method="post">
            <input type="hidden" th:field="*{id}" />

            <div class="mb-6">
                <label for="utilisateur" class="block text-gray-700 text-sm font-bold mb-2">Utilisateur:</label>
                <select id="utilisateur" th:field="*{utilisateur}" class="shadow border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
                    <option th:each="user : ${users}" th:value="${user.id}" th:text="${user.username}"></option>
                </select>
            </div>

            <div class="mb-6">
                <label for="plan" class="block text-gray-700 text-sm font-bold mb-2">Plan:</label>
                <select id="plan" th:field="*{plan}" class="shadow border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
                    <option th:each="plan : ${plans}" th:value="${plan.id}" th:text="${plan.nom}"></option>
                </select>
            </div>

            <div class="mb-6">
                <label for="dateDebut" class="block text-gray-700 text-sm font-bold mb-2">Date de Début:</label>
                <input type="date" id="dateDebut" th:field="*{dateDebut}" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required />
            </div>

            <div class="mb-6">
                <label for="dateFin" class="block text-gray-700 text-sm font-bold mb-2">Date de Fin (laisser vide pour une licence à vie):</label>
                <input type="date" id="dateFin" th:field="*{dateFin}" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" />
            </div>

            <div class="mb-6">
                <label for="statut" class="block text-gray-700 text-sm font-bold mb-2">Statut:</label>
                <select id="statut" th:field="*{statut}" class="shadow border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required>
                    <option th:each="s : ${T(com.example.boutique.model.LicenceStatus).values()}" th:value="${s}" th:text="${s}"></option>
                </select>
            </div>

            <div class="flex items-center justify-between">
                <button type="submit" class="px-6 py-3 bg-green-600 text-white font-semibold rounded-lg shadow-md hover:bg-green-700 transition-colors duration-300">
                    <i class="fas fa-save mr-2"></i> Enregistrer
                </button>
                <a th:href="@{/superadmin/licences}" class="px-6 py-3 bg-gray-600 text-white font-semibold rounded-lg shadow-md hover:bg-gray-700 transition-colors duration-300">
                    Annuler
                </a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
