<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Gérer les Licences</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">

<div th:replace="~{fragments/tailwind-header :: tailwind-header(pageTitle='Gérer les Licences')}"></div>

<div class="container mx-auto px-4 py-12">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-4xl font-bold text-gray-800">Gérer les Licences</h1>
        <div>
            <a th:href="@{/superadmin}" class="px-6 py-3 bg-gray-600 text-white font-semibold rounded-lg shadow-md hover:bg-gray-700 transition-colors duration-300 mr-4">
                <i class="fas fa-arrow-left mr-2"></i> Retour
            </a>
            <a th:href="@{/superadmin/licences/new}" class="px-6 py-3 bg-green-600 text-white font-semibold rounded-lg shadow-md hover:bg-green-700 transition-colors duration-300">
                <i class="fas fa-plus mr-2"></i> Assigner une Licence
            </a>
        </div>
    </div>

    <div class="bg-white rounded-lg shadow-lg overflow-hidden">
        <table class="min-w-full leading-normal">
            <thead>
                <tr>
                    <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Utilisateur</th>
                    <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Plan</th>
                    <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Statut</th>
                    <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Date de Début</th>
                    <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Date de Fin</th>
                    <th class="px-5 py-3 border-b-2 border-gray-200 bg-gray-100 text-left text-xs font-semibold text-gray-600 uppercase tracking-wider">Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="licence : ${licences}">
                    <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm" th:text="${licence.utilisateur.username}"></td>
                    <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm" th:text="${licence.plan.nom}"></td>
                    <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm" th:text="${licence.statut}"></td>
                    <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm" th:text="${licence.dateDebut}"></td>
                    <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm" th:text="${licence.dateFin}"></td>
                    <td class="px-5 py-5 border-b border-gray-200 bg-white text-sm">
                        <a th:href="@{/superadmin/licences/edit/{id}(id=${licence.id})}" class="text-indigo-600 hover:text-indigo-900 mr-4">
                            <i class="fas fa-edit"></i> Modifier
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

</body>
</html>
