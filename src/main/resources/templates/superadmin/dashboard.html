<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Super Admin Dashboard</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">

<div th:replace="~{fragments/tailwind-header :: tailwind-header(pageTitle='Super Admin')}"></div>

<div class="container mx-auto px-4 py-12">
    <div class="text-center mb-12">
        <h1 class="text-4xl font-bold text-gray-800">Super Admin Dashboard</h1>
        <p class="text-lg text-gray-600 mt-2">Gestion du système d'abonnement.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 max-w-4xl mx-auto">
        <a th:href="@{/superadmin/plans}" class="bg-white rounded-lg shadow-lg p-8 text-center hover:shadow-xl transition-shadow duration-300">
            <i class="fas fa-cogs text-4xl text-indigo-600"></i>
            <h2 class="text-2xl font-bold text-gray-800 mt-4">Gérer les Plans</h2>
            <p class="text-gray-600 mt-2">Créer, modifier et supprimer les plans d'abonnement.</p>
        </a>
        <a th:href="@{/superadmin/licences}" class="bg-white rounded-lg shadow-lg p-8 text-center hover:shadow-xl transition-shadow duration-300">
            <i class="fas fa-users-cog text-4xl text-green-600"></i>
            <h2 class="text-2xl font-bold text-gray-800 mt-4">Gérer les Licences</h2>
            <p class="text-gray-600 mt-2">Voir et assigner les licences aux utilisateurs.</p>
        </a>
    </div>
</div>

</body>
</html>
