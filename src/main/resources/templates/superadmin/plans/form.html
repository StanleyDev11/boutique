<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Créer/Modifier un Plan</title>
    <link rel="icon" type="image/x-icon" th:href="@{/favicon.ico}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100">

<div th:replace="~{fragments/tailwind-header :: tailwind-header(pageTitle='Gérer les Plans')}"></div>

<div class="container mx-auto px-4 py-12">
    <h1 class="text-4xl font-bold text-gray-800 mb-8" th:text="${plan.id == null} ? 'Créer un nouveau Plan' : 'Modifier le Plan'">Créer un Plan</h1>

    <div class="bg-white rounded-lg shadow-lg p-8">
        <form th:object="${plan}" th:action="${plan.id == null} ? @{/superadmin/plans/save} : @{/superadmin/plans/update/{id}(id=${plan.id})}" method="post">
            <input type="hidden" th:field="*{id}" />

            <div class="mb-6">
                <label for="nom" class="block text-gray-700 text-sm font-bold mb-2">Nom du Plan:</label>
                <input type="text" id="nom" th:field="*{nom}" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required />
            </div>

            <div class="mb-6">
                <label for="prix" class="block text-gray-700 text-sm font-bold mb-2">Prix:</label>
                <input type="number" step="0.01" id="prix" th:field="*{prix}" class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline" required />
            </div>

            <div class="mb-6">
                <label class="block text-gray-700 text-sm font-bold mb-2">Fonctionnalités:</label>
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                    <div th:each="feature : ${allFeatures}" class="flex items-center">
                        <input type="checkbox" th:id="${'feature-' + feature}" th:value="${feature}" th:field="*{features}" class="h-4 w-4 text-indigo-600 focus:ring-indigo-500 border-gray-300 rounded" />
                        <label th:for="${'feature-' + feature}" class="ml-2 block text-sm text-gray-900" th:text="${feature}"></label>
                    </div>
                </div>
            </div>

            <div class="flex items-center justify-between">
                <button type="submit" class="px-6 py-3 bg-green-600 text-white font-semibold rounded-lg shadow-md hover:bg-green-700 transition-colors duration-300">
                    <i class="fas fa-save mr-2"></i> Enregistrer
                </button>
                <a th:href="@{/superadmin/plans}" class="px-6 py-3 bg-gray-600 text-white font-semibold rounded-lg shadow-md hover:bg-gray-700 transition-colors duration-300">
                    Annuler
                </a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
