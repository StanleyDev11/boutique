<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Rapport de Fermeture de Caisse</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&amp;display=swap" rel="stylesheet" />
    <style>
        @page {
            size: 98mm 148mm;
            margin: 5mm;
        }
        body {
            font-family: 'Roboto', sans-serif;
            font-size: 8pt;
            color: #333;
        }
        .container {
            width: 100%;
            margin: 0 auto;
            padding: 0;
        }
        .header {
            text-align: center;
            margin-bottom: 10px;
            border-bottom: 1px solid #ccc;
            padding-bottom: 5px;
        }
        .header h1 {
            margin: 0;
            font-size: 12pt;
            color: #000;
        }
        .header p {
            margin: 1px 0;
            font-size: 7pt;
            color: #555;
        }
        .report-title {
            text-align: center;
            font-size: 10pt;
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
        }
        .section {
            margin-bottom: 8px;
            padding: 8px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #fdfdfd;
            page-break-inside: avoid;
        }
        .section-title {
            font-size: 9pt;
            font-weight: bold;
            color: #000;
            margin-bottom: 6px;
            border-bottom: 1px solid #eee;
            padding-bottom: 3px;
        }
        .info-item {
            display: block;
            padding: 2px 0;
            font-size: 8pt;
        }
        .info-item span:first-child {
            font-weight: 500;
            color: #333;
            display: inline-block;
            width: 90px;
        }
        .info-item span:last-child {
            font-weight: bold;
        }
        .summary-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 4px;
        }
        .summary-table td {
            padding: 4px;
            border-bottom: 1px solid #eee;
            font-size: 8pt;
        }
        .summary-table tr:last-child td {
            border-bottom: none;
        }
        .summary-table .label {
            font-weight: 500;
        }
        .summary-table .value {
            text-align: right;
            font-weight: bold;
        }
        .total-row .value {
            font-size: 9pt;
            color: #000;
        }
        .ecart-positif { color: #28a745; }
        .ecart-negatif { color: #dc3545; }

        .footer {
            text-align: center;
            margin-top: 10px;
            font-size: 6pt;
            color: #888;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 th:text="${globalParameters.nom_entreprise}"></h1>
            <p th:text="${globalParameters.adresse_entreprise}"></p>
            <p th:text="'Tél: ' + ${globalParameters.telephone_entreprise}"></p>
        </div>

        <h2 class="report-title">Rapport de Fermeture de Caisse</h2>

        <div class="section">
            <div class="section-title">Détails de la Session</div>
            <div>
                <div class="info-item"><span>ID Session:</span> <span th:text="${session.id}"></span></div>
                <div class="info-item"><span>Nom Caisse:</span> <span th:text="${session.caisse.nom}"></span></div>
                <div class="info-item"><span>Caissier:</span> <span th:text="${session.utilisateur.username}"></span></div>
                <div class="info-item"><span>Fermé par:</span> <span th:text="${session.fermeParUtilisateur != null ? session.fermeParUtilisateur.username : 'N/A'}"></span></div>
                <div class="info-item"><span>Ouverture:</span> <span th:text="${#temporals.format(session.dateOuverture, 'dd/MM/yyyy HH:mm')}"></span></div>
                <div class="info-item"><span>Fermeture:</span> <span th:text="${#temporals.format(session.dateFermeture, 'dd/MM/yyyy HH:mm')}"></span></div>
            </div>
        </div>

        <div class="section">
            <div class="section-title">Résumé Financier</div>
            <table class="summary-table">
                <tr>
                    <td class="label">Fond de caisse (Initial)</td>
                    <td class="value" th:text="${#numbers.formatDecimal(session.montantInitial ?: 0, 0, 'COMMA', 0, 'POINT')} + ' FCFA'"></td>
                </tr>
                 <tr>
                    <td class="label">Total des Ventes (Espèces)</td>
                    <td class="value" th:text="'+ ' + ${#numbers.formatDecimal(totalVentesEspeces ?: 0, 0, 'COMMA', 0, 'POINT')} + ' FCFA'"></td>
                </tr>
                <tr>
                    <td class="label">Montant Total déclarer par le caissier</td>
                    <td class="value" th:text="${#numbers.formatDecimal(session.montantFinal ?: 0, 0, 'COMMA', 0, 'POINT')} + ' FCFA'"></td>
                </tr>
            </table>
        </div>


                <div class="footer">
                    <p>Rapport généré le <span th:text="${#temporals.format(now, 'dd/MM/yyyy à HH:mm:ss')}"></span></p>
                    <p>© <span th:text="${#temporals.year(now)}"></span> <span th:text="${globalParameters.nom_entreprise}"></span>. Tous droits réservés.</p>
                </div>
    </div>
</body>
</html>
