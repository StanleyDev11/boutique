<!DOCTYPE html>
<html lang="fr" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${pageTitle}">Formulaire Produit</title>
</head>
<body>

<div th:fragment="form-content">

    <!-- Formulaire pour un seul produit (ajout/modification) -->
    <form th:if="${produit != null}" id="product-form" th:action="@{/produits/save}" th:object="${produit}" method="post" class="space-y-6" enctype="multipart/form-data">
        <input type="hidden" th:field="*{id}" />
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

        <h2 class="text-3xl font-bold text-gray-800 mb-8" th:text="${pageTitle}">Titre du Formulaire</h2>

        <!-- Section Image -->
        <div th:if="${produitImageUploadActive}" class="p-4 bg-gray-50 rounded-lg border">
            <label class="block text-sm font-medium text-gray-700 mb-2">Image du produit</label>
            <div class="flex items-center space-x-4">
                <img id="imagePreview"
                     th:src="@{${produit.getDisplayImageUrl()}}"
                     alt="Aperçu de l'image"
                     class="h-24 w-24 rounded-lg object-cover bg-gray-200">
                <div class="flex-grow">
                    <input type="file" name="imageFile" id="imageFile" accept="image/*"
                           class="block w-full text-sm text-gray-500
                                  file:mr-4 file:py-2 file:px-4
                                  file:rounded-full file:border-0
                                  file:text-sm file:font-semibold
                                  file:bg-blue-50 file:text-blue-700
                                  hover:file:bg-blue-100">
                    <p class="mt-1 text-xs text-gray-500">Laisser vide pour conserver l'image actuelle.</p>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label for="nom" class="block text-sm font-medium text-gray-700 mb-1">Nom du produit</label>
                <input type="text" id="nom" th:field="*{nom}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
            <div>
                <label for="categorie" class="block text-sm font-medium text-gray-700 mb-1">Catégorie</label>
                <input type="text" id="categorie" th:field="*{categorie}" list="categories-list" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                <datalist id="categories-list">
                    <option th:each="cat : ${categories}" th:value="${cat}"></option>
                </datalist>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label for="prixAchat" class="block text-sm font-medium text-gray-700 mb-1">Prix d'achat</label>
                <input type="number" step="any" id="prixAchat" th:field="*{prixAchat}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label for="prixVenteUnitaire" class="block text-sm font-medium text-gray-700 mb-1">Prix de vente</label>
                <input type="number" step="any" id="prixVenteUnitaire" th:field="*{prixVenteUnitaire}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 p-4 bg-blue-50 rounded-lg border border-blue-200">
            <div>
                <label for="prixPromotionnel" class="block text-sm font-medium text-gray-700 mb-1">Prix Promotionnel</label>
                <input type="number" step="any" id="prixPromotionnel" th:field="*{prixPromotionnel}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div class="flex items-end">
                <div class="flex items-center h-full">
                    <input type="checkbox" id="promotionActive" th:field="*{promotionActive}" class="h-5 w-5 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
                    <label for="promotionActive" class="ml-2 block text-sm font-medium text-gray-900">Activer la promotion</label>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
                <label for="quantiteEnStock" class="block text-sm font-medium text-gray-700 mb-1">Quantité en stock</label>
                <input type="number" step="any" id="quantiteEnStock" th:field="*{quantiteEnStock}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500" required>
            </div>
            <div>
                <label for="uniteDeVente" class="block text-sm font-medium text-gray-700 mb-1">Unité de vente</label>
                <select id="uniteDeVente" th:field="*{uniteDeVente}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    <option value="PIECE">Pièce</option>
                    <option value="KG">Kg</option>
                    <option value="LITRE">Litre</option>
                </select>
            </div>
            <div>
                <label for="codeBarres" class="block text-sm font-medium text-gray-700 mb-1">Code-barres</label>
                <input type="text" id="codeBarres" th:field="*{codeBarres}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <div>
                <label for="numeroFacture" class="block text-sm font-medium text-gray-700 mb-1">Numéro de facture</label>
                <input type="text" id="numeroFacture" th:field="*{numeroFacture}" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
        </div>
         <div>
                <label for="datePeremption" class="block text-sm font-medium text-gray-700 mb-1">Date de péremption</label>
                <input type="date" id="datePeremption" name="datePeremption"
                       th:value="${produit.datePeremption != null ? #temporals.format(produit.datePeremption, 'yyyy-MM-dd') : ''}"
                       class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>
    </form>

    <!-- Formulaire pour l'ajout par lot -->
    <div th:if="${productBatchDto != null}">
        <div class="flex items-center justify-between mb-8 pb-4 border-b border-gray-200">
            <h2 class="text-3xl font-bold text-gray-800 flex items-center">
                <i class="fas fa-file-invoice-dollar text-blue-600 mr-4"></i>
                <span th:text="${pageTitle}">Ajouter des produits par lot</span>
            </h2>
        </div>

        <form id="product-batch-form" th:action="@{/produits/save-batch}" th:object="${productBatchDto}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />

            <div class="bg-blue-50/70 p-6 rounded-xl mb-8 border border-blue-200/80 shadow-sm">
                <h3 class="text-xl font-semibold text-gray-800 mb-5 flex items-center">
                    <i class="fas fa-file-alt text-gray-500 mr-3"></i>
                    Informations sur la Facture
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-x-6 gap-y-4">
                    <div>
                        <label for="batchNumeroFacture" class="block text-sm font-medium text-gray-700 mb-1.5"><i class="fas fa-hashtag mr-2 text-gray-400"></i>Numéro de facture *</label>
                        <input type="text" id="batchNumeroFacture" th:field="*{numeroFacture}" class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition" required>
                    </div>
                    <div>
                        <label for="batchNomFournisseur" class="block text-sm font-medium text-gray-700 mb-1.5"><i class="fas fa-truck-loading mr-2 text-gray-400"></i>Nom du fournisseur</label>
                        <input type="text" id="batchNomFournisseur" th:field="*{nomFournisseur}" class="w-full px-4 py-2.5 bg-white border border-gray-300 rounded-lg shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 transition">
                    </div>
                </div>
            </div>

            <div id="product-lines-container" class="space-y-6">
                <!-- JS will inject product lines here -->
            </div>

            <div class="mt-8 pt-6 border-t border-dashed">
                <button type="button" id="add-product-btn" class="w-full bg-white border-2 border-dashed border-blue-400 hover:border-solid hover:bg-blue-50 text-blue-600 font-bold py-4 px-4 rounded-xl transition duration-300 ease-in-out flex items-center justify-center shadow-sm hover:shadow-md">
                    <i class="fas fa-plus-circle mr-3 text-lg"></i>
                    Ajouter une ligne de produit
                </button>
            </div>
        </form>
    </div>

    <script th:inline="javascript">
        // Image preview script
        const imageFileInput = document.getElementById('imageFile');
        if (imageFileInput) {
            imageFileInput.addEventListener('change', function(event) {
                const [file] = event.target.files;
                if (file) {
                    const preview = document.getElementById('imagePreview');
                    preview.src = URL.createObjectURL(file);
                    preview.onload = () => URL.revokeObjectURL(preview.src); // free memory
                }
            });
        }
    </script>
</div>

</body>
</html>
