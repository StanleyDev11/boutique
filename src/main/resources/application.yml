spring:
  application:
    name: boutique

  # --- Configuration de la base de données (MySQL Active) ---
  datasource:
    url: jdbc:mysql://localhost/:3306/popo?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
    username: root
    password: ''
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20

  # --- Configuration JPA ---
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    database-platform: org.hibernate.dialect.MySQLDialect

  # Flyway DÉSACTIVÉ sur le profil par défaut (dev/MySQL) : le baseline est
  # écrit pour H2 et n'est activé que sur le profil "desktop" (voir
  # application-desktop.yml). Le dev conserve donc ddl-auto=update sans Flyway.
  flyway:
    enabled: false

# --- Configuration pour PostgreSQL (Inactive) ---
#  datasource:
#    url: jdbc:postgresql://localhost:5432/boutiquedb
#    username: postgres
#    password: ''
#    driver-class-name: org.postgresql.Driver
#  jpa:
#    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 8085
  servlet:
    session:
      timeout: 110m

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,loggers

